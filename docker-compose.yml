services:
  app:
    build: .
    container_name: helpit_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: helpit_nginx
    restart: unless-stopped
    ports:
      - "8082:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: helpit_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: helpit
      MYSQL_USER: helpit
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - helpit_db_data:/var/lib/mysql
  phpmyadmin:
      image: phpmyadmin/phpmyadmin
      container_name: helpit_phpmyadmin
      restart: unless-stopped
      ports:
        - "8083:80"
      environment:
        PMA_HOST: db
        PMA_PORT: 3306
      depends_on:
        - db
volumes:
  helpit_db_data:
